services:
  postgres:
    image: postgres:16
    container_name: gym_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gym
      POSTGRES_USER: gym_user
      POSTGRES_PASSWORD: gym_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_user -d gym"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
